<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitalis AI Központ</title>
  <link rel="stylesheet" href="/admin.css">
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img src="/vitalis-logo.jpg" alt="Vitalis">
      <div>
        <h1>Vitalis AI Központ</h1>
        <p>Chatbot beszélgetések és tudásfejlesztés</p>
      </div>
    </div>

    <button id="refreshButton" type="button">
      Frissítés
    </button>
  </header>

  <main class="container">

    <section class="stats">
      <div class="stat-card">
        <span>Összes beszélgetés</span>
        <strong id="totalCount">–</strong>
      </div>

      <div class="stat-card">
        <span>Mai beszélgetések</span>
        <strong id="todayCount">–</strong>
      </div>

      <div class="stat-card">
        <span>Megjelenített találatok</span>
        <strong id="visibleCount">–</strong>
      </div>
    </section>

    <section class="toolbar">
      <div>
        <h2>Vásárlói beszélgetések</h2>
        <p>A webshop chatbotjában feltett kérdések és a chatbot válaszai.</p>
      </div>

      <input
        type="search"
        id="searchInput"
        placeholder="Keresés a beszélgetésekben..."
      >
    </section>

    <section id="statusMessage" class="status">
      Beszélgetések betöltése...
    </section>

    <section id="conversationList" class="conversation-list">
    </section>

  </main>

  <script src="/admin.js"></script>
</body>
</html>
